<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Logger</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #718096;
      --accent: #6366f1;
      --gaming: #f43f5e;
      --dev: #22d3ee;
      --browsing: #a78bfa;
      --comm: #34d399;
      --prod: #fbbf24;
      --media: #f97316;
      --system: #64748b;
      --idle: #374151;
      --other: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
    header .subtitle { color: var(--muted); font-size: 12px; }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .date-nav button {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .date-nav button:hover { background: #3a3d4e; }

    .date-nav input[type=date] {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .export-btn {
      background: var(--accent) !important;
      font-weight: 500;
    }
    .export-btn:hover { background: #4f52d9 !important; }

    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 700; }
    .stat-card .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .chart-wrap { position: relative; height: 220px; }
    .chart-wrap-tall { position: relative; height: 300px; }

    /* App table */
    table { width: 100%; border-collapse: collapse; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; padding: 0 8px 8px; font-weight: 500; }
    td { padding: 7px 8px; border-top: 1px solid var(--border); font-size: 13px; }
    tr:first-child td { border-top: none; }

    .cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .progress-bar-bg { background: var(--border); border-radius: 4px; height: 6px; width: 100%; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

    /* Timeline */
    #timeline-container {
      overflow-x: auto;
      padding-bottom: 4px;
    }
    #timeline-canvas-wrap {
      position: relative;
      min-width: 600px;
    }

    /* Heatmap */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(28, 1fr);
      gap: 3px;
    }
    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      cursor: default;
      transition: opacity 0.15s;
    }
    .heatmap-cell:hover { opacity: 0.7; }

    .loading { color: var(--muted); text-align: center; padding: 40px; }
    .error { color: #f87171; padding: 12px; background: rgba(248,113,113,0.1); border-radius: 6px; }

    /* Export panel */
    #export-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #export-panel.open { display: flex; }
    .export-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .export-modal h3 { font-size: 15px; font-weight: 600; }
    .export-modal textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 12px;
      resize: none;
      min-height: 300px;
    }
    .export-modal .btn-row { display: flex; gap: 8px; }
    .export-modal button {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .export-modal button.primary { background: var(--accent); }
    .export-modal button:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Activity Logger</h1>
    <div class="subtitle" id="header-subtitle">Loading…</div>
  </div>
  <div class="date-nav">
    <button onclick="shiftDay(-1)">◀</button>
    <input type="date" id="date-picker" onchange="loadDate(this.value)" />
    <button onclick="shiftDay(1)">▶</button>
    <button onclick="loadDate(todayStr())">Today</button>
    <button class="export-btn" onclick="openExport()">Export for AI ↗</button>
  </div>
</header>

<main>
  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Active Time</div>
      <div class="value" id="stat-active">—</div>
      <div class="sub" id="stat-active-sub"></div>
    </div>
    <div class="stat-card">
      <div class="label">Idle Time</div>
      <div class="value" id="stat-idle">—</div>
      <div class="sub" id="stat-idle-sub"></div>
    </div>
    <div class="stat-card">
      <div class="label">Top Category</div>
      <div class="value" id="stat-top-cat">—</div>
      <div class="sub" id="stat-top-cat-sub"></div>
    </div>
    <div class="stat-card">
      <div class="label">Most Used App</div>
      <div class="value" id="stat-top-app">—</div>
      <div class="sub" id="stat-top-app-sub"></div>
    </div>
  </div>

  <!-- Charts row -->
  <div class="grid-2">
    <div class="card">
      <h2>Time by Category</h2>
      <div class="chart-wrap">
        <canvas id="cat-chart"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>Hourly Activity</h2>
      <div class="chart-wrap">
        <canvas id="hourly-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- App table -->
  <div class="card" style="margin-bottom:16px">
    <h2>Top Applications</h2>
    <div id="app-table-wrap">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="card" style="margin-bottom:16px">
    <h2>Session Timeline</h2>
    <div id="timeline-container">
      <div id="timeline-canvas-wrap">
        <canvas id="timeline-chart" height="160"></canvas>
      </div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="card">
    <h2>4-Week Activity Heatmap</h2>
    <div id="heatmap-wrap" class="heatmap-grid"></div>
    <div style="color:var(--muted);font-size:11px;margin-top:8px;">Each cell = one day. Darker = more active time.</div>
  </div>
</main>

<!-- Export modal -->
<div id="export-panel" onclick="if(event.target===this)closeExport()">
  <div class="export-modal">
    <h3>Export for AI Analysis</h3>
    <div class="btn-row">
      <button onclick="loadExport('markdown')">Markdown</button>
      <button onclick="loadExport('json')">JSON</button>
      <span style="flex:1"></span>
      <button onclick="copyExport()">Copy</button>
      <button onclick="closeExport()">Close</button>
    </div>
    <textarea id="export-text" readonly placeholder="Click Markdown or JSON above to generate…"></textarea>
  </div>
</div>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────

const CAT_COLORS = {
  Gaming: "#f43f5e",
  Development: "#22d3ee",
  Browsing: "#a78bfa",
  Communication: "#34d399",
  Productivity: "#fbbf24",
  Media: "#f97316",
  System: "#64748b",
  Idle: "#374151",
  Other: "#94a3b8",
};

function catColor(cat) { return CAT_COLORS[cat] || CAT_COLORS.Other; }

function fmtDuration(secs) {
  if (secs == null || secs < 1) return "0s";
  secs = Math.round(secs);
  if (secs < 60) return secs + "s";
  const m = Math.floor(secs / 60);
  if (m < 60) return m + "m";
  const h = Math.floor(m / 60), rm = m % 60;
  return rm > 0 ? `${h}h ${rm}m` : `${h}h`;
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function shiftDay(delta) {
  const d = new Date(currentDate + "T12:00:00");
  d.setDate(d.getDate() + delta);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  loadDate(`${y}-${m}-${day}`);
}

// ── State ─────────────────────────────────────────────────────────────────────

let currentDate = todayStr();
let catChartInst = null;
let hourlyChartInst = null;
let timelineChartInst = null;

// ── Init ──────────────────────────────────────────────────────────────────────

document.getElementById("date-picker").value = currentDate;
loadDate(currentDate);
loadHeatmap();

// ── Load date ─────────────────────────────────────────────────────────────────

async function loadDate(date) {
  currentDate = date;
  document.getElementById("date-picker").value = date;

  const [summaryRes, timelineRes] = await Promise.all([
    fetch(`/api/summary?date=${date}`),
    fetch(`/api/timeline?date=${date}`),
  ]);

  const summary = await summaryRes.json();
  const timeline = await timelineRes.json();

  updateStats(summary);
  renderCategoryChart(summary.categories);
  renderHourlyChart(summary.hourly);
  renderAppTable(summary.apps, summary.active_seconds);
  renderTimeline(timeline.sessions);

  const dow = new Date(date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("header-subtitle").textContent = dow;
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function updateStats(s) {
  const total = s.active_seconds + s.idle_seconds;
  document.getElementById("stat-active").textContent = fmtDuration(s.active_seconds);
  document.getElementById("stat-active-sub").textContent = total > 0 ? `${Math.round(100*s.active_seconds/total)}% of tracked` : "";
  document.getElementById("stat-idle").textContent = fmtDuration(s.idle_seconds);
  document.getElementById("stat-idle-sub").textContent = "";

  if (s.categories && s.categories.length > 0) {
    const top = s.categories[0];
    document.getElementById("stat-top-cat").textContent = top.category;
    document.getElementById("stat-top-cat-sub").textContent = fmtDuration(top.total_seconds);
  }
  if (s.apps && s.apps.length > 0) {
    const top = s.apps[0];
    document.getElementById("stat-top-app").textContent = top.display_name;
    document.getElementById("stat-top-app-sub").textContent = fmtDuration(top.total_seconds);
  }
}

// ── Category donut chart ──────────────────────────────────────────────────────

function renderCategoryChart(categories) {
  if (catChartInst) catChartInst.destroy();
  const ctx = document.getElementById("cat-chart").getContext("2d");
  if (!categories || categories.length === 0) return;

  catChartInst = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: categories.map(c => c.category),
      datasets: [{
        data: categories.map(c => c.total_seconds),
        backgroundColor: categories.map(c => catColor(c.category)),
        borderColor: "#1a1d27",
        borderWidth: 2,
        hoverOffset: 8,
      }],
    },
    options: {
      cutout: "65%",
      plugins: {
        legend: {
          position: "right",
          labels: { color: "#e2e8f0", font: { size: 12 }, padding: 12, boxWidth: 14 },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${fmtDuration(ctx.raw)}`,
          },
        },
      },
    },
  });
}

// ── Hourly bar chart ──────────────────────────────────────────────────────────

function renderHourlyChart(hourly) {
  if (hourlyChartInst) hourlyChartInst.destroy();
  const ctx = document.getElementById("hourly-chart").getContext("2d");
  if (!hourly) return;

  const labels = Array.from({length: 24}, (_, i) => `${i}:00`);
  const data = labels.map((_, i) => (hourly[String(i)] || 0) / 60);

  hourlyChartInst = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: "#6366f180",
        borderColor: "#6366f1",
        borderWidth: 1,
        borderRadius: 3,
      }],
    },
    options: {
      scales: {
        x: { ticks: { color: "#718096", maxRotation: 0, font: { size: 10 } }, grid: { color: "#2a2d3e" } },
        y: { ticks: { color: "#718096", font: { size: 10 }, callback: v => v + "m" }, grid: { color: "#2a2d3e" } },
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${fmtDuration(ctx.raw * 60)}` } },
      },
    },
  });
}

// ── App table ─────────────────────────────────────────────────────────────────

function renderAppTable(apps, activeSecs) {
  const wrap = document.getElementById("app-table-wrap");
  if (!apps || apps.length === 0) {
    wrap.innerHTML = '<div class="loading">No data for this day</div>';
    return;
  }

  const maxSecs = apps[0].total_seconds;
  let html = `<table>
    <thead><tr><th>App</th><th>Category</th><th>Time</th><th style="width:160px">%</th></tr></thead><tbody>`;

  for (const row of apps.slice(0, 15)) {
    const pct = activeSecs > 0 ? (row.total_seconds / activeSecs * 100) : 0;
    const barPct = maxSecs > 0 ? (row.total_seconds / maxSecs * 100) : 0;
    const color = catColor(row.category);
    html += `<tr>
      <td>${esc(row.display_name)}</td>
      <td><span class="cat-badge" style="background:${color}22;color:${color}">${esc(row.category || 'Other')}</span></td>
      <td>${fmtDuration(row.total_seconds)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-bar-bg" style="flex:1">
            <div class="progress-bar-fill" style="width:${barPct}%;background:${color}"></div>
          </div>
          <span style="color:var(--muted);font-size:11px;width:36px;text-align:right">${pct.toFixed(1)}%</span>
        </div>
      </td>
    </tr>`;
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;
}

// ── Timeline ──────────────────────────────────────────────────────────────────

function renderTimeline(sessions) {
  if (timelineChartInst) { timelineChartInst.destroy(); timelineChartInst = null; }
  if (!sessions || sessions.length === 0) return;

  const canvas = document.getElementById("timeline-chart");
  const ctx = canvas.getContext("2d");

  const dayStart = new Date(currentDate + "T00:00:00").getTime() / 1000;
  const dayEnd   = new Date(currentDate + "T23:59:59").getTime() / 1000;
  const dayLen   = dayEnd - dayStart;

  const datasets = sessions
    .filter(s => s.start != null && s.end != null)
    .map(s => ({
      label: s.app,
      data: [{ x: s.start - dayStart, x2: s.end - dayStart, y: 0 }],
      backgroundColor: s.is_idle ? "#374151" : catColor(s.category),
      borderColor: "#1a1d27",
      borderWidth: 1,
      barThickness: 28,
    }));

  // Use a custom draw approach via a simple canvas drawing rather than Chart.js
  // (Chart.js timeline charts require a plugin; we draw directly)
  _drawTimeline(ctx, canvas, sessions, dayStart, dayLen);
}

function _drawTimeline(ctx, canvas, sessions, dayStart, dayLen) {
  const W = canvas.parentElement.clientWidth || 800;
  canvas.width = W;
  canvas.height = 160;
  ctx.clearRect(0, 0, W, 160);

  const PAD_L = 48, PAD_R = 16, PAD_T = 30, BAR_H = 50;
  const plotW = W - PAD_L - PAD_R;

  // Hour grid lines
  ctx.strokeStyle = "#2a2d3e";
  ctx.fillStyle = "#718096";
  ctx.font = "10px system-ui";
  ctx.textAlign = "center";
  for (let h = 0; h <= 24; h++) {
    const x = PAD_L + plotW * (h * 3600) / dayLen;
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, PAD_T + BAR_H + 20);
    ctx.stroke();
    if (h % 2 === 0 && h < 24) ctx.fillText(`${h}:00`, x, PAD_T - 8);
  }

  // Session bars
  for (const s of sessions) {
    if (!s.start || !s.end) continue;
    const x = PAD_L + plotW * (s.start - dayStart) / dayLen;
    const w = Math.max(1, plotW * (s.end - s.start) / dayLen);
    ctx.fillStyle = s.is_idle ? "#374151" : catColor(s.category);
    ctx.beginPath();
    ctx.roundRect(x, PAD_T, w, BAR_H, [3]);
    ctx.fill();
  }

  // Tooltip hover (simple)
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (my < PAD_T || my > PAD_T + BAR_H) {
      canvas.title = "";
      return;
    }

    const t = dayStart + ((mx - PAD_L) / plotW) * dayLen;
    const hit = sessions.find(s => s.start <= t && (s.end || t+1) >= t);
    if (hit) {
      const dur = fmtDuration(hit.duration);
      canvas.title = `${hit.app} (${hit.category}) — ${dur}`;
    } else {
      canvas.title = "";
    }
  };
}

// ── Heatmap ───────────────────────────────────────────────────────────────────

async function loadHeatmap() {
  const res = await fetch("/api/heatmap?days=28");
  const { days } = await res.json();
  const wrap = document.getElementById("heatmap-wrap");
  wrap.innerHTML = "";

  const maxVal = Math.max(...days.map(d => d.active_seconds), 1);
  for (const d of days) {
    const cell = document.createElement("div");
    cell.className = "heatmap-cell";
    const intensity = d.active_seconds / maxVal;
    const alpha = 0.08 + 0.85 * intensity;
    cell.style.background = `rgba(99,102,241,${alpha})`;
    cell.title = `${d.date}: ${fmtDuration(d.active_seconds)} active`;
    wrap.appendChild(cell);
  }
}

// ── Export ────────────────────────────────────────────────────────────────────

function openExport() {
  document.getElementById("export-panel").classList.add("open");
}
function closeExport() {
  document.getElementById("export-panel").classList.remove("open");
}
async function loadExport(fmt) {
  const ta = document.getElementById("export-text");
  ta.value = "Generating…";
  const res = await fetch(`/api/export?start=${currentDate}&end=${currentDate}&format=${fmt}`);
  ta.value = fmt === "json"
    ? JSON.stringify(await res.json(), null, 2)
    : await res.text();
}
function copyExport() {
  const ta = document.getElementById("export-text");
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = event.target;
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Redraw timeline on window resize
window.addEventListener("resize", () => {
  if (currentDate) loadDate(currentDate);
});

// Auto-refresh every 30 seconds if viewing today
setInterval(() => {
  if (currentDate === todayStr()) loadDate(currentDate);
}, 30000);
</script>
</body>
</html>
